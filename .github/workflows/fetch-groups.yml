name: Fetch Groups from Comick

on:
  schedule:
    - cron: "0 0 * * *" # Daily at midnight UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch and merge groups
        run: node scripts/fetch-comick-groups.js

      - name: Enrich missing URLs
        run: node scripts/enrich-group-urls.js

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add groups.json
          git diff --cached --quiet || git commit -m "chore: update groups from comick" && git push
